name = "game-api-backend"
compatibility_date = "2024-04-16"

# D1 数据库配置
[[d1_databases]]
binding = "DB"
database_name = "game-db"
database_id = "your-database-id" # 运行 `npx wrangler d1 create game-db` 后获取

# KV 存储（可选，用于缓存）
[[kv_namespaces]]
binding = "CACHE_KV"
id = "your-kv-namespace-id"

[vars]
ENVIRONMENT = "development"
